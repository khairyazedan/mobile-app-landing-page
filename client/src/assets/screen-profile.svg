<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="400" rx="32" fill="#f7f8ff"/>
  <rect x="70" y="14" width="60" height="8" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="20" y="55" font-family="Arial" font-size="14" font-weight="bold" fill="#1a1a2e">Profile</text>
  <!-- Avatar -->
  <circle cx="100" cy="110" r="34" fill="url(#av)"/>
  <defs>
    <linearGradient id="av" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5c6ef8"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
  </defs>
  <text x="100" y="118" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white">EJ</text>
  <text x="100" y="162" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a1a2e">Emma Johnson</text>
  <text x="100" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">emma@example.com</text>
  <!-- Menu rows -->
  <line x1="20" y1="195" x2="180" y2="195" stroke="#eee" stroke-width="1"/>
  <text x="40" y="216" font-family="Arial" font-size="11" fill="#444">Personal Information</text>
  <line x1="20" y1="228" x2="180" y2="228" stroke="#eee" stroke-width="1"/>
  <text x="40" y="249" font-family="Arial" font-size="11" fill="#444">Notifications</text>
  <line x1="20" y1="261" x2="180" y2="261" stroke="#eee" stroke-width="1"/>
  <text x="40" y="282" font-family="Arial" font-size="11" fill="#444">Privacy &amp; Security</text>
  <line x1="20" y1="294" x2="180" y2="294" stroke="#eee" stroke-width="1"/>
  <text x="40" y="315" font-family="Arial" font-size="11" fill="#444">Help &amp; Support</text>
  <line x1="20" y1="327" x2="180" y2="327" stroke="#eee" stroke-width="1"/>
  <text x="40" y="348" font-family="Arial" font-size="11" fill="#ef4444">Log Out</text>
</svg>
